<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2A1200"/>
      <stop offset="100%" stop-color="#0E0600"/>
    </radialGradient>
  </defs>
  <!-- Badge rings -->
  <circle cx="32" cy="32" r="31" fill="#8B6000"/>
  <circle cx="32" cy="32" r="29" fill="#0E0600"/>
  <circle cx="32" cy="32" r="27" fill="none" stroke="#F5CC00" stroke-width="1.2"/>
  <circle cx="32" cy="32" r="25" fill="url(#bg)"/>
  <!-- VI in calligraphy style -->
  <text x="6" y="41" font-family="Georgia,serif" font-size="22" font-style="italic" font-weight="bold" fill="#F5CC00">V</text>
  <text x="21" y="41" font-family="Georgia,serif" font-size="22" font-style="italic" font-weight="bold" fill="#5C2800">I</text>
  <text x="28" y="41" font-family="Georgia,serif" font-size="22" font-style="italic" font-weight="bold" fill="#F5CC00">K</text>
  <!-- Dot above I -->
  <circle cx="25" cy="17" r="2.5" fill="#F5CC00"/>
  <circle cx="25" cy="17" r="1.2" fill="#fff" opacity="0.9"/>
