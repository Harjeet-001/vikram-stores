<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2A1200"/>
      <stop offset="100%" stop-color="#0E0600"/>
    </radialGradient>
    <radialGradient id="goldGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#C8900A"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&amp;display=swap');
    </style>
  </defs>

  <!-- ── Outer decorative rings ── -->
  <circle cx="200" cy="200" r="192" fill="#8B6000" />
  <circle cx="200" cy="200" r="188" fill="#0E0600" />
  <circle cx="200" cy="200" r="183" fill="none" stroke="#F5CC00" stroke-width="1.5"/>
  <circle cx="200" cy="200" r="179" fill="none" stroke="#8B6000" stroke-width="0.8"/>
  <circle cx="200" cy="200" r="175" fill="none" stroke="#F5CC00" stroke-width="2.5"/>

  <!-- Ornamental dots on outer ring -->
  <g fill="#F5CC00">
    <circle cx="200" cy="17"  r="3"/>
    <circle cx="200" cy="383" r="3"/>
    <circle cx="17"  cy="200" r="3"/>
    <circle cx="383" cy="200" r="3"/>
    <circle cx="335" cy="65"  r="2.5"/>
    <circle cx="65"  cy="335" r="2.5"/>
    <circle cx="335" cy="335" r="2.5"/>
    <circle cx="65"  cy="65"  r="2.5"/>
    <circle cx="282" cy="27"  r="2"/>
    <circle cx="118" cy="27"  r="2"/>
    <circle cx="282" cy="373" r="2"/>
    <circle cx="118" cy="373" r="2"/>
    <circle cx="27"  cy="282" r="2"/>
    <circle cx="27"  cy="118" r="2"/>
    <circle cx="373" cy="282" r="2"/>
    <circle cx="373" cy="118" r="2"/>
  </g>

  <!-- Small diamond ornaments on ring -->
  <g fill="#F5CC00" transform="rotate(0,200,200)">
    <polygon points="200,18 204,26 200,34 196,26" />
    <polygon points="200,366 204,374 200,382 196,374" />
    <polygon points="18,200 26,204 34,200 26,196" />
    <polygon points="366,200 374,204 382,200 374,196" />
  </g>

  <!-- ── Inner rings ── -->
  <circle cx="200" cy="200" r="168" fill="none" stroke="#8B6000" stroke-width="1"/>
  <circle cx="200" cy="200" r="163" fill="none" stroke="#F5CC00" stroke-width="1.5" stroke-dasharray="4 3"/>
  <circle cx="200" cy="200" r="157" fill="none" stroke="#C8900A" stroke-width="1"/>
  <circle cx="200" cy="200" r="152" fill="none" stroke="#F5CC00" stroke-width="2"/>
  <circle cx="200" cy="200" r="146" fill="none" stroke="#8B6000" stroke-width="0.8"/>

  <!-- ── Badge fill ── -->
  <circle cx="200" cy="200" r="143" fill="url(#bgGrad)"/>

  <!-- ── Decorative top arc text: VIKRAM CRACKERS ── -->
  <path id="topArc" d="M 80,200 A 120,120 0 0,1 320,200" fill="none"/>
  <path id="botArc" d="M 85,215 A 115,115 0 0,0 315,215" fill="none"/>

  <!-- Top label -->
  <text font-family="Georgia, serif" font-size="13" fill="#F5CC00" font-weight="bold" letter-spacing="4">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">✦ VIKRAM CRACKERS ✦</textPath>
  </text>

  <!-- ── Thin separator lines ── -->
  <line x1="95"  y1="178" x2="305" y2="178" stroke="#C8900A" stroke-width="0.8" opacity="0.6"/>
  <line x1="100" y1="182" x2="300" y2="182" stroke="#F5CC00" stroke-width="0.5" opacity="0.4"/>

  <!-- ── VIKRAM calligraphy text ── -->
  <!-- V -->
  <text x="71" y="248" font-family="Georgia, 'Times New Roman', serif" font-size="88"
        font-style="italic" font-weight="bold" fill="#F5CC00" filter="url(#glow)"
        transform="skewX(-5)">V</text>
  <!-- I (brown) -->
  <text x="126" y="248" font-family="Georgia, 'Times New Roman', serif" font-size="88"
        font-style="italic" font-weight="bold" fill="#5C2800" filter="url(#glow)"
        transform="skewX(-5)">I</text>
  <!-- K -->
  <text x="147" y="248" font-family="Georgia, 'Times New Roman', serif" font-size="88"
        font-style="italic" font-weight="bold" fill="#F5CC00" filter="url(#glow)"
        transform="skewX(-5)">K</text>
  <!-- R -->
  <text x="200" y="248" font-family="Georgia, 'Times New Roman', serif" font-size="88"
        font-style="italic" font-weight="bold" fill="#F5CC00" filter="url(#glow)"
        transform="skewX(-5)">R</text>
  <!-- A -->
  <text x="247" y="248" font-family="Georgia, 'Times New Roman', serif" font-size="88"
        font-style="italic" font-weight="bold" fill="#F5CC00" filter="url(#glow)"
        transform="skewX(-5)">A</text>
  <!-- M -->
  <text x="291" y="248" font-family="Georgia, 'Times New Roman', serif" font-size="88"
        font-style="italic" font-weight="bold" fill="#F5CC00" filter="url(#glow)"
        transform="skewX(-5)">M</text>

  <!-- ── Dot above the I ── -->
  <!-- Decorative spark/dot above I -->
  <g filter="url(#glow)">
    <!-- Main dot -->
    <circle cx="143" cy="148" r="7" fill="#F5CC00"/>
    <!-- Inner bright dot -->
    <circle cx="143" cy="148" r="3.5" fill="#fff" opacity="0.9"/>
    <!-- Rays around dot -->
    <line x1="143" y1="136" x2="143" y2="131" stroke="#F5CC00" stroke-width="2" stroke-linecap="round"/>
    <line x1="143" y1="160" x2="143" y2="165" stroke="#F5CC00" stroke-width="2" stroke-linecap="round"/>
    <line x1="131" y1="148" x2="126" y2="148" stroke="#F5CC00" stroke-width="2" stroke-linecap="round"/>
    <line x1="155" y1="148" x2="160" y2="148" stroke="#F5CC00" stroke-width="2" stroke-linecap="round"/>
    <line x1="135" y1="140" x2="131" y2="136" stroke="#F5CC00" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="151" y1="140" x2="155" y2="136" stroke="#F5CC00" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="135" y1="156" x2="131" y2="160" stroke="#F5CC00" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="151" y1="156" x2="155" y2="160" stroke="#F5CC00" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- ── Bottom separator ── -->
  <line x1="100" y1="262" x2="300" y2="262" stroke="#F5CC00" stroke-width="0.5" opacity="0.4"/>
  <line x1="95"  y1="266" x2="305" y2="266" stroke="#C8900A" stroke-width="0.8" opacity="0.6"/>

  <!-- ── Bottom arc: SIVAKASI ── -->
  <path id="botArc2" d="M 90,270 A 115,115 0 0,0 310,270" fill="none"/>
  <text font-family="Georgia, serif" font-size="11" fill="#C8900A" letter-spacing="5">
    <textPath href="#botArc2" startOffset="50%" text-anchor="middle">✦ SIVAKASI ✦</textPath>
  </text>

  <!-- ── Corner sparkle ornaments inside badge ── -->
  <g fill="#C8900A" opacity="0.7">
    <polygon points="115,190 118,182 121,190 129,193 121,196 118,204 115,196 107,193" />
    <polygon points="285,190 288,182 291,190 299,193 291,196 288,204 285,196 277,193" />
  </g>
</svg>
